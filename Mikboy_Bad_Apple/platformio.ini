[env:mik32v2]
platform = MIK32
board = start-mik32-v1
; board = development-board
; board = mik32v2
framework = framework-mik32v2-sdk
; board_build.ldscript = eeprom


board_build.ldscript = spifi
board_upload.maximum_size = 8388608
upload_speed = 2000
; upload_command = py C:\Users\admin\Documents\PlatformIO\bootloader\commander\bootloader.py $SOURCE -p COM28 -b 1515200
upload_command = py C:\Users\Администратор\Desktop\commander\main.py  -p COM23 --baudrate 1500000 upload $SOURCE